# Wiederverwendbare Pipeline: Tests, Build und optional GitHub Release.
name: Pipeline

on:
  workflow_call:
    inputs:
      create_release:
        description: 'GitHub Release mit Build-Artefakten erstellen'
        type: boolean
        default: false

env:
  GO_VERSION: '1.25'
  GOTOOLCHAIN: auto

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Checkout sconfig (replace dependency)
      run: |
        cd "$GITHUB_WORKSPACE/.."
        git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/janmz/sconfig.git"
        git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/janmz/ssh-commands.git"
      env:
        TOKEN: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-${{ github.repository }}-go-mod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-${{ github.repository }}-go-mod-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64.8
        install-mode: goinstall
        args: --timeout=5m

  i18n-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Validate translations
      run: |
        if [ ! -f "locales/en.json" ]; then
          echo "Error: locales/en.json missing"
          exit 1
        fi
        if [ ! -f "locales/de.json" ]; then
          echo "Error: locales/de.json missing"
          exit 1
        fi
        python3 -m json.tool locales/en.json > /dev/null
        python3 -m json.tool locales/de.json > /dev/null
        echo "i18n validation passed"

  build:
    needs: [test, i18n-validate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Checkout sconfig (replace dependency)
      run: |
        cd "$GITHUB_WORKSPACE/.."
        git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/janmz/sconfig.git"
        git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/janmz/ssh-commands.git"
      env:
        TOKEN: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Get version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=$(git describe --tags --always --dirty)
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
        echo "git_commit=$GITHUB_SHA" >> $GITHUB_OUTPUT

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        BINARY_NAME="wp_plugin_release"
        if [ "$GOOS" = "windows" ]; then
          BINARY_NAME="${BINARY_NAME}.exe"
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            find . -name "*.syso" -delete
          fi
        else
          find . -name "*.syso" -delete
        fi

        go build \
          -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version }} -X 'main.BuildTime=${{ steps.version.outputs.build_time }}' -X main.GitCommit=${{ steps.version.outputs.git_commit }}" \
          -o "bin/${BINARY_NAME}" \
          .

    - name: Create release package
      run: |
        BINARY_NAME="wp_plugin_release"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME="${BINARY_NAME}.exe"
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            find . -name "*.syso" -delete
          fi
        else
          find . -name "*.syso" -delete
        fi

        PACKAGE_NAME="wp_plugin_release-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"

        mkdir -p "dist/$PACKAGE_NAME"
        cp "bin/$BINARY_NAME" "dist/$PACKAGE_NAME/"
        cp README.md "dist/$PACKAGE_NAME/"
        cp LICENSE "dist/$PACKAGE_NAME/"
        cp SECURITY.md "dist/$PACKAGE_NAME/"
        cp -r locales "dist/$PACKAGE_NAME/"

        cd dist
        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip -r "$PACKAGE_NAME.zip" "$PACKAGE_NAME"
        else
          tar -czf "$PACKAGE_NAME.tar.gz" "$PACKAGE_NAME"
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wp_plugin_release-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/wp_plugin_release-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.zip' || '.tar.gz' }}

  release:
    if: inputs.create_release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: ${{ contains(github.ref, '-') }}
        generate_release_notes: true
        files: artifacts/*/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install gosec
      run: go install github.com/securego/gosec/v2/cmd/gosec@latest

    - name: Run gosec
      uses: securego/gosec@v2.19.0
      with:
        args: ./...
      continue-on-error: true
