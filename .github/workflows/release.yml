# Release-Build nur bei Tag-Push (v*). Kein doppelter Lauf mit Branch-CI.
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  pipeline:
    permissions:
      contents: write
    uses: ./.github/workflows/pipeline.yml
    with:
      create_release: true
    secrets: inherit
